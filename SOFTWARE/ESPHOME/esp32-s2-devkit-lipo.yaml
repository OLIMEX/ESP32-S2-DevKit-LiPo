esphome:
  name: esp32-s2-devkit-lipo
  comment: Olimex ESP32-S2-DevKit-LIPO

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

# ---- PSRAM (only for WROVER variant) ----
# Uncomment ONLY if your board uses ESP32-S2 WROVER module
# (modules with embedded PSRAM)
#
# psram:
#   mode: quad
#   speed: 80MHz

logger:

# ================= NETWORKING =================

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-S2 Fallback"
    password: "fallback123"

captive_portal:

# ================= ONBOARD IO =================

# ---- User Button ----
binary_sensor:
  - platform: gpio
    name: "User Button"
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true

# ---- Power / Battery Sense (disabled by default) ----
# To ENABLE these sensors, you MUST close SMT jumpers:
#   - PWR_SENSE_E1  (enables GPIO7)
#   - BAT_SENS_E1   (enables GPIO8)
#
# Electrical details:
#   GPIO7 (Power Sense): divider 10k (to +5V) / 1k (to GND)
#   GPIO8 (Battery):     divider 4.7M (to VBAT) / 470k (to GND)

sensor:
  - platform: adc
    pin: GPIO7
    name: "External Power Sense"
    attenuation: 12db
    update_interval: 10s
    filters:
      - multiply: 11.0   # compensate 10k/1k divider

  - platform: adc
    pin: GPIO8
    name: "Battery Voltage"
    attenuation: 12db
    update_interval: 10s
    filters:
      - multiply: 11.0   # compensate 4.7M/470k divider

# ---- RGB LED (WS2812S) ----
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: GPIO18
    num_leds: 1
    name: "RGB LED"

# ---- Hardware UART (USB-Serial via CH340) ----
# GPIO44 = RX (connected to CH340 TXD)
# GPIO43 = TX (connected to CH340 RXD)
uart:
  - id: usb_uart
    tx_pin: GPIO43
    rx_pin: GPIO44
    baud_rate: 115200

# ================= FREE GPIO EXPOSURE =================
# Define unused pins here for quick prototyping

switch:
  - platform: gpio
    name: "GPIO1 Output"
    pin: GPIO1

  - platform: gpio
    name: "GPIO2 Output"
    pin: GPIO2

  - platform: gpio
    name: "GPIO3 Output"
    pin: GPIO3

# ================= CORE SERVICES =================

ota:
  - platform: esphome

api: