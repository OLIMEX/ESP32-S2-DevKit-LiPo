[platformio]
default_envs = esp32-s2-devkit-lipo

[env:esp32-s2-devkit-lipo]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino

# ---- Upload / Monitor ----
upload_speed = 921600
monitor_speed = 115200

# ---- Flash Settings ----
board_build.flash_mode = dio
board_build.flash_size = 4MB

# ---- PSRAM (ONLY for WROVER variant) ----
# Uncomment if your module is ESP32-S2-WROVER (has PSRAM)
#
# board_build.psram = enabled
# build_flags =
#   -DBOARD_HAS_PSRAM
#   -mfix-esp32-psram-cache-issue

# ---- USB / Serial (CH340 via UART) ----
# Using external USB-UART, NOT native USB CDC
build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0

# ---- Logging / Debug ----
monitor_filters = esp32_exception_decoder

# ---- Recommended stability flags ----
build_unflags = -Os
build_flags =
  ${env.build_flags}
  -O2
  -Wall

# ---- Dependencies (add as needed) ----
lib_deps =
  # example:
  # adafruit/Adafruit NeoPixel@^1.11.0
